<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Register</title>

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/register.css" />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="nav-container">
        <div class="logo">
          <img src="assets/images/logo.png" alt="AquaKids Logo" />
          <span>AquaKids</span>
        </div>

        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="pricing.html">Pricing</a>
          <a href="about.html">About</a>
          <a href="login.html">Login</a>
          <a href="register.html" class="btn btn-primary">Sign Up</a>
        </nav>

        <div class="menu-icon">
          <i class="ri-menu-line"></i>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="register">
      <div class="form-container">
        <h2>Create Account</h2>
        <p>Join AquaKids and start your child’s journey</p>

        <div id="form_error" class="form-error"></div>

        <form id="registerForm">
          <label>Full Name</label>
          <input
            type="text"
            name="full_name"
            placeholder="Emily Johnson"
            required
          />
          <small class="error" id="full_name_error"></small>

          <label>Email</label>
          <input
            type="email"
            name="email"
            placeholder="you@example.com"
            required
          />
          <small class="error" id="email_error"></small>

          <label>Phone Number</label>
          <input type="tel" name="phone" placeholder="0791234567" required />
          <small class="error" id="phone_error"></small>

          <label>Password</label>
          <input type="password" name="password" required />
          <small class="error" id="password_error"></small>

          <button type="submit">Register</button>

          <p>
            Already have an account?
            <a href="login.html">Sign in</a>
          </p>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-container">
        <div class="footer-grid">
          <div>
            <h4 class="footer-title">Programs</h4>
            <div class="footer-links">
              <a href="#">Infant Splash</a>
              <a href="#">Toddler Swim</a>
            </div>
          </div>

          <div>
            <h4 class="footer-title">Resources</h4>
            <div class="footer-links">
              <a href="#">FAQs</a>
            </div>
          </div>

          <div>
            <h4 class="footer-title">Account</h4>
            <div class="footer-links">
              <a href="login.html">Login</a>
              <a href="#">Dashboard</a>
            </div>
          </div>

          <div>
            <h4 class="footer-title">Contact</h4>
            <div class="footer-links">
              <a href="#">Email</a>
            </div>
          </div>
        </div>

        <div class="footer-bottom">
          <p class="footer-copy">© 2025 AquaKids</p>
        </div>
      </div>
    </footer>

    <script src="js/navbar.js"></script>
    <script>
      const form = document.getElementById("registerForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        console.log("Form Data:", data);

        let isValid = true;

        // CLEAR ERRORS
        clearFormError();
        document
          .querySelectorAll(".error")
          .forEach((el) => (el.textContent = ""));
        document
          .querySelectorAll("input")
          .forEach((el) => el.classList.remove("error-border"));

        // VALIDATIONS

        // FULL NAME
        if (!data.full_name || data.full_name.trim().length < 3) {
          showError("full_name", "Full name must be at least 3 characters");
          isValid = false;
        }

        // EMAIL
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!data.email || !emailRegex.test(data.email)) {
          showError("email", "Enter a valid email address");
          isValid = false;
        }

        // PHONE (SA format)
        const phoneRegex = /^0\d{9}$/;
        if (!data.phone || !phoneRegex.test(data.phone)) {
          showError(
            "phone",
            "Enter a valid 10-digit phone number (0791234567)",
          );
          isValid = false;
        }

        // PASSWORD
        if (!data.password || data.password.length < 6) {
          showError("password", "Password must be at least 6 characters");
          isValid = false;
        }

        if (!isValid) return;

        // SEND TO SERVER
        try {
          const response = await fetch("/api/users/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              fullName: data.full_name,
              email: data.email,
              phone: data.phone,
              password: data.password,
            }),
          });

          const result = await response.json();

          if (response.ok) {
            alert("Registration successful!");
            window.location.href = "login.html";
          } else {
            // FIELD ERRORS FROM BACKEND
            if (result.errors) {
              Object.keys(result.errors).forEach((field) => {
                showError(field, result.errors[field]);
              });
            } else {
              // GLOBAL ERROR
              showFormError(result.message || "Registration failed");
            }
          }
        } catch (error) {
          console.error(error);
          showFormError("Server error. Please try again later.");
        }
      });

      // FIELD ERROR
      function showError(field, message) {
        const errorEl = document.getElementById(field + "_error");
        const inputEl = document.querySelector(`[name="${field}"]`);

        if (errorEl) errorEl.textContent = message;
        if (inputEl) inputEl.classList.add("error-border");
      }

      // GLOBAL ERROR
      function showFormError(message) {
        const formError = document.getElementById("form_error");
        formError.textContent = message;
        formError.style.display = "block";
      }

      function clearFormError() {
        const formError = document.getElementById("form_error");
        formError.textContent = "";
        formError.style.display = "none";
      }
    </script>
  </body>
</html>
