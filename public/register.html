<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Register</title>

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/register.css" />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="nav-container">
        <div class="logo">
          <img src="assets/images/logo.png" alt="AquaKids Logo" />
          <span>AquaKids</span>
        </div>

        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="pricing.html">Pricing</a>
          <a href="about.html">About</a>
          <a href="login.html">Login</a>
          <a href="register.html" class="btn btn-primary">Sign Up</a>
        </nav>

        <div class="menu-icon">
          <i class="ri-menu-line"></i>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="register">
      <div class="form-container">
        <h2>Create Account</h2>
        <p>Join AquaKids and start your child’s journey</p>

        <form>
          <label>First Name</label>
          <input type="text" placeholder="Emily" required />

          <label>Last Name</label>
          <input type="text" placeholder="Smith" required />

          <label>Email</label>
          <input type="email" placeholder="you@example.com" required />

          <label>Password</label>
          <input type="password" placeholder="••••••••••" required />

          <label>Confirm Password</label>
          <input type="password" placeholder="••••••••••" required />

          <button type="submit">Register</button>

          <p>
            Already have an account?
            <a href="login.html">Sign in</a>
          </p>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-container">
        <div class="footer-grid">
          <div>
            <h4 class="footer-title">Programs</h4>
            <div class="footer-links">
              <a href="#">Infant Splash</a>
              <a href="#">Toddler Swim</a>
            </div>
          </div>

          <div>
            <h4 class="footer-title">Resources</h4>
            <div class="footer-links">
              <a href="#">FAQs</a>
            </div>
          </div>

          <div>
            <h4 class="footer-title">Account</h4>
            <div class="footer-links">
              <a href="login.html">Login</a>
              <a href="#">Dashboard</a>
            </div>
          </div>

          <div>
            <h4 class="footer-title">Contact</h4>
            <div class="footer-links">
              <a href="#">Email</a>
            </div>
          </div>
        </div>

        <div class="footer-bottom">
          <p class="footer-copy">© 2025 AquaKids</p>
        </div>
      </div>
    </footer>

    <script src="js/navbar.js"></script>
  </body>
</html>
